name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: pip install -e ".[dev]"
      - name: Pytest
        # test_k8s_integration.py auto-skips unless EIREL_K8S_INTEGRATION=1
        # (requires a real cluster). We leave it unset here; that test
        # lives behind a separate opt-in workflow or manual run.
        run: pytest tests -q
