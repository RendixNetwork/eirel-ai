global:
  resolve_timeout: 5m
route:
  receiver: default-webhook
  group_by: [alertname, service, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="critical"]
      receiver: critical-webhook
      group_wait: 10s
      repeat_interval: 1h
      continue: false
    - matchers: [severity="warning"]
      receiver: default-webhook
      group_wait: 2m
      group_interval: 10m
      repeat_interval: 12h
receivers:
  - name: default-webhook
    webhook_configs:
      - url: http://discord-bridge:8080/default
        send_resolved: true
  - name: critical-webhook
    webhook_configs:
      - url: http://discord-bridge:8080/critical
        send_resolved: true
inhibit_rules:
  - source_matchers: [alertname="EirelOwnerApiDown"]
    target_matchers:
      - alertname=~"EirelUnhealthyDeploymentsPresent|EirelEpochSnapshotsStuckOpen|EirelAggregateSnapshotsPendingTooLong|EirelWorkflowDeadLetterGrowing|EirelNoRuntimeNodesAvailable"
    equal: [cluster]
  - source_matchers: [alertname="EirelRuntimeNodeDown"]
    target_matchers: [alertname="EirelNodeExporterDown"]
    equal: [node]
  - source_matchers: [alertname="EirelMetagraphListenerDown"]
    target_matchers:
      - alertname=~"EirelValidatorSetTooSmall|EirelMetagraphSyncFailing"
    equal: [cluster]
