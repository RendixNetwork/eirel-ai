---
all:
  vars:
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_user: root
    ansible_become: true
  children:
    k3s_servers:
      hosts:
        k3s-server-1:
          ansible_host: 10.0.0.10
          # For e2e testing on the same machine, use:
          # ansible_host: localhost
          # ansible_connection: local
    k3s_agents:
      hosts:
        worker-1:
          ansible_host: 10.0.0.20
        worker-2:
          ansible_host: 10.0.0.21
