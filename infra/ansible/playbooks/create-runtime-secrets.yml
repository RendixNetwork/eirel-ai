---
- name: Create runtime shared secret
  hosts: k3s_servers[0]
  become: true
  tasks:
    - name: Apply eirel-runtime-shared secret (idempotent)
      ansible.builtin.shell: >
        kubectl create secret generic {{ eirel_runtime_shared_secret_name }}
        --namespace={{ eirel_miners_namespace }}
        --from-literal=INTERNAL_SERVICE_TOKEN={{ internal_service_token }}
        --from-literal=PROVIDER_PROXY_TOKEN={{ provider_proxy_token }}
        --from-literal=EIREL_WEB_SEARCH_TOKEN={{ web_search_tool_token }}
        --from-literal=EIREL_SANDBOX_TOKEN={{ sandbox_tool_token }}
        --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true
      no_log: true
