---
- name: Deploy in-cluster container registry
  hosts: k3s_servers[0]
  become: true
  tasks:
    - name: Apply registry deployment and service
      ansible.builtin.shell: |
        cat <<'MANIFEST' | kubectl apply -f -
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: registry
          namespace: {{ eirel_system_namespace }}
          labels:
            app: registry
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: registry
          template:
            metadata:
              labels:
                app: registry
            spec:
              containers:
                - name: registry
                  image: registry:2
                  ports:
                    - containerPort: 5000
                  volumeMounts:
                    - name: registry-data
                      mountPath: /var/lib/registry
              volumes:
                - name: registry-data
                  # v1: emptyDir is acceptable; data lost on pod restart.
                  # Switch to PVC for durable storage in production.
                  emptyDir: {}
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: registry
          namespace: {{ eirel_system_namespace }}
          labels:
            app: registry
        spec:
          type: NodePort
          selector:
            app: registry
          ports:
            - port: 5000
              targetPort: 5000
              nodePort: 30500
        MANIFEST
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Wait for registry pod to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods -l app=registry
        -n {{ eirel_system_namespace }} --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
