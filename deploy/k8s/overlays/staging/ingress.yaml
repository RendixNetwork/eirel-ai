apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eirel-staging-public
  namespace: eirel
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - chat.staging.eirel.local
      secretName: eirel-staging-consumer-tls
  rules:
    - host: chat.staging.eirel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: consumer-chat-api
                port:
                  number: 8080
