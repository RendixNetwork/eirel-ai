apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: owner-api-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: owner-api-node-reader
subjects:
  - kind: ServiceAccount
    name: owner-api
    namespace: eirel-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: owner-api-node-reader
