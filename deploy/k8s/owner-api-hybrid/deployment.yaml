apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-api
  namespace: eirel-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owner-api
  template:
    metadata:
      labels:
        app: owner-api
    spec:
      serviceAccountName: owner-api
      nodeSelector:
        eirel.dev/role: control-plane
      terminationGracePeriodSeconds: 30
      containers:
        - name: owner-api
          # Default image published by the eirel-ai docker-publish workflow.
          # Pin or swap via kustomize:
          #     kustomize edit set image rendixnetwork/eirel-ai=rendixnetwork/eirel-ai:v0.2.0
          image: rendixnetwork/eirel-ai:latest
          imagePullPolicy: Always
          command: ["owner-api"]
          workingDir: /app/eirel-ai
          envFrom:
            - configMapRef:
                name: owner-api-config
            - secretRef:
                name: owner-api-secrets
          env:
            # Downward API: node IP for reaching compose services
            - name: SERVER_A_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # Compose-hosted dependency URLs via downward API substitution
            - name: DATABASE_URL
              value: "postgresql+psycopg://eirel:$(DATABASE_PASSWORD)@$(SERVER_A_HOST_IP):25432/eirel"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(SERVER_A_HOST_IP):16379/0"
            - name: EIREL_PROVIDER_PROXY_URL
              value: "http://$(SERVER_A_HOST_IP):18092"
            - name: EIREL_WEB_SEARCH_TOOL_URL
              value: "http://$(SERVER_A_HOST_IP):18085"
            - name: EIREL_X_TOOL_URL
              value: "http://$(SERVER_A_HOST_IP):18086"
            - name: EIREL_SANDBOX_TOOL_URL
              value: "http://$(SERVER_A_HOST_IP):18091"
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: bittensor-wallets
              mountPath: /root/.bittensor/wallets
              readOnly: true
            - name: artifact-storage
              mountPath: /tmp/eirel-managed-artifacts
      volumes:
        - name: bittensor-wallets
          hostPath:
            path: /root/.bittensor/wallets
            type: Directory
        - name: artifact-storage
          emptyDir: {}
