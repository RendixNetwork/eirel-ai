apiVersion: v1
kind: ServiceAccount
metadata:
  name: owner-api
  namespace: eirel-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: owner-api-miner-ops
  namespace: eirel-miners
rules:
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: owner-api-miner-ops
  namespace: eirel-miners
subjects:
  - kind: ServiceAccount
    name: owner-api
    namespace: eirel-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: owner-api-miner-ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: owner-api-system-read
  namespace: eirel-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: owner-api-system-read
  namespace: eirel-system
subjects:
  - kind: ServiceAccount
    name: owner-api
    namespace: eirel-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: owner-api-system-read
