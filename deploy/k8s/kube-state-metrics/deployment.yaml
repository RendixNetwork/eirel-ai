apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: eirel-system
  labels:
    app.kubernetes.io/name: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      nodeSelector:
        eirel.dev/role: control-plane
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          args:
            - --resources=pods,nodes,namespaces,deployments,replicasets,statefulsets,daemonsets,jobs,cronjobs,persistentvolumeclaims,services,networkpolicies
            - --namespaces=eirel-miners,eirel-control-plane,eirel-system
            - --metric-labels-allowlist=pods=[eirel.dev/submission-id,eirel.dev/family-id,eirel.dev/hotkey]
          ports:
            - containerPort: 8080
              name: http-metrics
            - containerPort: 8081
              name: telemetry
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
