apiVersion: v1
kind: ConfigMap
metadata:
  name: eirel-control-plane-config
  namespace: eirel
data:
  REDIS_URL: redis://redis.eirel.svc.cluster.local:6379/0
  OWNER_API_URL: http://owner-api.eirel.svc.cluster.local:8000
  OWNER_API_PUBLIC_URL: http://owner-api.eirel.svc.cluster.local:8000
  OWNER_API_INTERNAL_URL: http://owner-api.eirel.svc.cluster.local:8000
  API_GATEWAY_URL: http://api-gateway.eirel.svc.cluster.local:8000
  API_GATEWAY_PUBLIC_URL: http://api-gateway.eirel.svc.cluster.local:8000
  CONTROL_PLANE_INTERNAL_URL: http://api-gateway.eirel.svc.cluster.local:8000
  CONSUMER_API_PUBLIC_URL: http://consumer-chat-api.eirel.svc.cluster.local:8080
  VALIDATOR_ENGINE_PUBLIC_URL: http://validator-engine.eirel.svc.cluster.local:8010
  METAGRAPH_LISTENER_PUBLIC_URL: http://metagraph-listener.eirel.svc.cluster.local:8011
  WEIGHT_SETTER_PUBLIC_URL: http://weight-setter.eirel.svc.cluster.local:8012
  PROVIDER_PROXY_PUBLIC_URL: http://provider-proxy.eirel.svc.cluster.local:8092
  RESEARCH_TOOL_SERVICE_URL: http://research-tool-service.eirel.svc.cluster.local:8085
  EIREL_PROVIDER_PROXY_URL: http://provider-proxy.eirel.svc.cluster.local:8092
  EIREL_RESEARCH_TOOL_SERVICE_URL: http://research-tool-service.eirel.svc.cluster.local:8085
  EIREL_RESEARCH_TOOL_POLICY_VERSION: research-live-v1
  EIREL_RESEARCH_TOOL_MAX_REQUESTS: "8"
  EIREL_RESEARCH_TOOL_MAX_QUERIES: "6"
  EIREL_RESEARCH_TOOL_MAX_SELECTED_SOURCES: "5"
  EIREL_RESEARCH_TOOL_TIMEOUT_SECONDS: "15"
  EIREL_BENCHMARK_RETRIEVAL_SERVICE_URL: http://retrieval-service.eirel.svc.cluster.local:8081
  VALIDATOR_EPOCH_QUORUM: "1"
  GATEWAY_RATE_LIMIT_REQUESTS: "120"
  GATEWAY_RATE_LIMIT_WINDOW_SECONDS: "60"
  GATEWAY_SYNC_TIMEOUT_SECONDS: "8"
  GATEWAY_POLL_INTERVAL_SECONDS: "0.2"
  CONSUMER_RATE_LIMIT_REQUESTS: "60"
  CONSUMER_RATE_LIMIT_WINDOW_SECONDS: "60"
  EXECUTION_STREAM_NAME: eirel:tasks
  EXECUTION_STREAM_GROUP: execution-workers
  EXECUTION_WORKER_LEASE_SECONDS: "60"
  EXECUTION_WORKER_MAX_RETRIES: "3"
  EXECUTION_WORKER_POLL_INTERVAL_SECONDS: "0.5"
  MINIMUM_VALIDATOR_STAKE: "0"
  BITTENSOR_NETWORK: finney
  BITTENSOR_NETUID: "0"
  OWNER_RUNTIME_BACKEND: baremetal
  OWNER_KUBECTL_BINARY_PATH: /usr/bin/kubectl
  EIREL_OWNER_RUNTIME_NAMESPACE: eirel-miners
  OWNER_RUNTIME_SERVICE_ACCOUNT: default
  OWNER_RUNTIME_INIT_IMAGE: curlimages/curl:8.7.1
  OWNER_RUNTIME_HEALTH_TIMEOUT_SECONDS: "60"
  OWNER_RUNTIME_RESTART_BUDGET: "2"
  OWNER_RUNTIME_POOL_LABEL_KEY: eirel.dev/runtime-pool
  OWNER_RUNTIME_POOL_LABEL_VALUE: "true"
  OWNER_RUNTIME_CLASS_LABEL_KEY: eirel.dev/runtime-class
  OWNER_RUNTIME_CLASS_LABEL_VALUE: miner
  OWNER_RUNTIME_CAPACITY_REFRESH_INTERVAL_SECONDS: "30"
  OWNER_RUNTIME_CAPACITY_CPU_HEADROOM_MILLIS: "500"
  OWNER_RUNTIME_CAPACITY_MEMORY_HEADROOM_MB: "512"
  OWNER_RUNTIME_CAPACITY_POD_HEADROOM: "1"
  OBJECT_STORAGE_BACKEND: filesystem
  OBJECT_STORAGE_ENDPOINT_URL: ""
  OBJECT_STORAGE_REGION: ""
  OBJECT_STORAGE_PREFIX: ""
  OBJECT_STORAGE_USE_SSL: "true"
  OBJECT_STORAGE_ADDRESSING_STYLE: auto
  ARTIFACT_STORAGE_ROOT: /var/lib/eirel/artifacts
  ARTIFACT_STORAGE_BUCKET: eirel-managed
  METAGRAPH_SNAPSHOT_PATH: ""
