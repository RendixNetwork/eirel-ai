apiVersion: v1
kind: Service
metadata:
  name: research-tool-service
  namespace: eirel
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8085"
spec:
  selector:
    app: research-tool-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
---
