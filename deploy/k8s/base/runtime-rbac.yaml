apiVersion: v1
kind: ServiceAccount
metadata:
  name: owner-runtime-controller
  namespace: eirel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: owner-runtime-controller
  namespace: eirel
rules:
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: owner-runtime-controller
  namespace: eirel
subjects:
  - kind: ServiceAccount
    name: owner-runtime-controller
    namespace: eirel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: owner-runtime-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: owner-runtime-controller-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: owner-runtime-controller-node-reader
subjects:
  - kind: ServiceAccount
    name: owner-runtime-controller
    namespace: eirel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: owner-runtime-controller-node-reader
