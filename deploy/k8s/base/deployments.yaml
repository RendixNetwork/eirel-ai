apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-tool-service
  namespace: eirel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: research-tool-service
  template:
    metadata:
      labels:
        app: research-tool-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: research-tool-service
          image: rendixnetwork/eirel-ai:latest
          imagePullPolicy: Always
          command: ["research-tool-service"]
          envFrom:
            - configMapRef:
                name: eirel-control-plane-config
            - secretRef:
                name: eirel-control-plane-secrets
          ports:
            - containerPort: 8085
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-api
  namespace: eirel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owner-api
  template:
    metadata:
      labels:
        app: owner-api
    spec:
      serviceAccountName: owner-runtime-controller
      terminationGracePeriodSeconds: 30
      containers:
        - name: owner-api
          image: rendixnetwork/eirel-ai:latest
          imagePullPolicy: Always
          command: ["owner-api"]
          envFrom:
            - configMapRef:
                name: eirel-control-plane-config
            - secretRef:
                name: eirel-control-plane-secrets
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: artifact-storage
              mountPath: /var/lib/eirel/artifacts
      volumes:
        - name: artifact-storage
          persistentVolumeClaim:
            claimName: eirel-artifact-storage
---
