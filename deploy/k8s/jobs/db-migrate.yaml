apiVersion: batch/v1
kind: Job
metadata:
  name: eirel-db-migrate
  namespace: eirel
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: eirel-db-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-migrate
          image: rendixnetwork/eirel-ai:latest
          imagePullPolicy: Always
          command: ["eirel-ai", "migrate"]
          envFrom:
            - configMapRef:
                name: eirel-control-plane-config
            - secretRef:
                name: eirel-control-plane-secrets
